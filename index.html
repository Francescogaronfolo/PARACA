<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PARACA!</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Bebas+Neue&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{width:100vw;height:100vh;overflow:hidden;background:#0a0a0a;font-family:'Rajdhani',sans-serif;}

/* ====== LOGIN ====== */
#screen-login{
position:fixed;inset:0;z-index:100;
display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:32px;
}
#bg-login{
position:absolute;inset:0;
background-image:url(‘bg.png’);
background-size:cover;background-position:center top;z-index:0;
}
#bg-login::after{content:’’;position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,0) 50%,rgba(0,0,0,0.2) 100%);}
#login-title{position:absolute;top:8px;left:0;right:0;text-align:center;z-index:2;pointer-events:none;}
#login-title h1{
font-family:‘Black Han Sans’,sans-serif;
font-size:clamp(68px,14vw,128px);color:#7B1020;
text-shadow:4px 4px 0 #3d000a,7px 7px 0 rgba(0,0,0,0.2);
line-height:1;animation:titlePulse 4s ease-in-out infinite;
}
@keyframes titlePulse{
0%,100%{color:#7B1020;}
50%{color:#8B1828;text-shadow:4px 4px 0 #3d000a,7px 7px 0 rgba(0,0,0,0.2),0 0 40px rgba(123,16,32,0.3);}
}
#popup{
position:relative;z-index:2;
background:rgba(235,226,206,0.87);border:2px solid rgba(123,16,32,0.35);
border-radius:4px;padding:14px 20px 18px;width:min(320px,86vw);
backdrop-filter:blur(10px);box-shadow:0 8px 32px rgba(0,0,0,0.25);
}
#popup::before,#popup::after{content:’’;position:absolute;width:11px;height:11px;border-color:rgba(123,16,32,0.55);border-style:solid;}
#popup::before{top:-1px;left:-1px;border-width:2px 0 0 2px;}
#popup::after{bottom:-1px;right:-1px;border-width:0 2px 2px 0;}
.p-head{text-align:center;margin-bottom:10px;padding-bottom:9px;border-bottom:1px solid rgba(123,16,32,0.18);}
.p-head .lbl{font-size:9px;letter-spacing:5px;text-transform:uppercase;color:rgba(123,16,32,0.5);}
.p-head .rank{font-family:‘Bebas Neue’,sans-serif;font-size:20px;color:#7B1020;letter-spacing:5px;}
.frow{margin-bottom:8px;}
.flbl{font-size:9px;letter-spacing:4px;text-transform:uppercase;color:rgba(80,30,30,0.55);margin-bottom:3px;}
.finp{width:100%;background:rgba(255,255,255,0.55);border:1px solid rgba(123,16,32,0.25);border-radius:2px;padding:7px 10px;color:#2a0a0a;font-family:‘Rajdhani’,sans-serif;font-size:15px;font-weight:600;letter-spacing:2px;outline:none;transition:border-color .2s,background .2s;}
.finp:focus{border-color:rgba(123,16,32,0.6);background:rgba(255,255,255,0.78);}
.finp::placeholder{color:rgba(80,30,30,0.28);font-weight:400;}
#err-msg{font-size:10px;color:#7B1020;letter-spacing:1px;text-align:center;height:12px;margin-top:4px;opacity:0;transition:opacity .3s;}
#err-msg.show{opacity:1;}
#btn-start{width:100%;margin-top:12px;padding:10px;background:#7B1020;border:none;border-radius:2px;color:#fff;font-family:‘Bebas Neue’,sans-serif;font-size:18px;letter-spacing:6px;cursor:pointer;box-shadow:0 3px 12px rgba(123,16,32,0.3);transition:background .2s,transform .1s;}
#btn-start:hover{background:#9B1828;}
#btn-start:active{transform:scale(0.98);}
#btn-start:disabled{background:rgba(140,120,110,0.4);cursor:not-allowed;box-shadow:none;}

/* ====== MAPPA STATICA ====== */
#screen-map{position:fixed;inset:0;z-index:50;display:none;flex-direction:column;background:#0a0a0a;}
#screen-map.show{display:flex;}

#hud{
flex-shrink:0;height:44px;
background:rgba(6,8,5,0.97);border-bottom:1px solid rgba(180,150,80,0.25);
display:flex;align-items:center;padding:0 10px;z-index:300;gap:6px;
}
.hud-title{font-family:‘Black Han Sans’,sans-serif;font-size:18px;color:#7B1020;text-shadow:2px 2px 0 #3d000a;}
.hud-stat{font-family:‘Rajdhani’,sans-serif;font-size:10px;font-weight:700;color:#c0aa80;letter-spacing:1px;white-space:nowrap;}
.hud-stat b{color:#C9A84C;font-size:12px;}
.hsep{color:rgba(180,150,80,0.2);font-size:14px;}
#hud-name{margin-left:auto;font-family:‘Bebas Neue’,sans-serif;font-size:11px;color:rgba(180,150,80,0.7);letter-spacing:2px;white-space:nowrap;}

/* MAP AREA — occupa tutto lo spazio rimanente */
#map-area{
flex:1;position:relative;
display:flex;align-items:center;justify-content:center;
overflow:hidden;background:#111;
}

/* Mappa centrata, dimensione fissa */
#map-wrap{
position:relative;
/* dimensioni calcolate in JS */
}
#map-img{display:block;width:100%;height:100%;image-rendering:auto;}

/* PORTE SCI-FI */
.door{
position:absolute;
cursor:pointer;
width:16px;height:11px;
transform:translate(-50%,-50%);
z-index:10;
}
.door-body{
width:100%;height:100%;
border:1.5px solid #C9A84C;
border-radius:2px;
background:rgba(201,168,76,0.1);
position:relative;
box-shadow:0 0 7px rgba(201,168,76,0.6),inset 0 0 3px rgba(201,168,76,0.15);
animation:dpulse 2s ease-in-out infinite;
}
.door-body::before{
content:’’;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
width:4px;height:4px;background:#C9A84C;border-radius:50%;
box-shadow:0 0 5px #C9A84C;
}
.door-body::after{
content:’’;position:absolute;top:-4px;left:50%;transform:translateX(-50%);
width:0;height:0;
border-left:3px solid transparent;border-right:3px solid transparent;
border-bottom:3px solid rgba(201,168,76,0.9);
}
.door.locked .door-body{
border-color:#c0392b;background:rgba(192,57,43,0.08);
box-shadow:0 0 7px rgba(192,57,43,0.6),inset 0 0 3px rgba(192,57,43,0.15);
animation:dpulsered 2s ease-in-out infinite;
}
.door.locked .door-body::before{background:#c0392b;box-shadow:0 0 5px #c0392b;}
.door.locked .door-body::after{border-bottom-color:rgba(192,57,43,0.9);}
@keyframes dpulse{
0%,100%{box-shadow:0 0 5px rgba(201,168,76,0.4);}
50%{box-shadow:0 0 12px rgba(201,168,76,1),inset 0 0 5px rgba(201,168,76,0.2);}
}
@keyframes dpulsered{
0%,100%{box-shadow:0 0 5px rgba(192,57,43,0.4);}
50%{box-shadow:0 0 12px rgba(192,57,43,1),inset 0 0 5px rgba(192,57,43,0.2);}
}

/* Tooltip sul hover */
.door-tip{
position:absolute;bottom:16px;left:50%;transform:translateX(-50%);
background:rgba(6,8,5,0.92);border:1px solid rgba(201,168,76,0.4);
border-radius:2px;padding:2px 6px;
font-family:‘Rajdhani’,sans-serif;font-size:9px;font-weight:700;
color:#C9A84C;letter-spacing:1px;white-space:nowrap;
opacity:0;transition:opacity .15s;pointer-events:none;
}
.door:hover .door-tip{opacity:1;}

/* BOTTOM BAR */
#bottom-bar{
flex-shrink:0;height:48px;
background:rgba(6,8,5,0.97);border-top:1px solid rgba(180,150,80,0.18);
display:flex;align-items:center;justify-content:center;gap:24px;
}
.bb-item{text-align:center;}
.bb-lbl{font-size:7px;letter-spacing:3px;color:rgba(180,150,80,0.45);text-transform:uppercase;display:block;}
.bb-val{font-family:‘Bebas Neue’,sans-serif;font-size:16px;color:#C9A84C;letter-spacing:2px;}

/* MODAL */
#modal{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,0.75);display:none;align-items:center;justify-content:center;}
#modal.show{display:flex;}
#mbox{

@keyframes mIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

#mbox::before{top:-1px;left:-1px;border-width:2px 0 0 2px;}
#mbox::after{bottom:-1px;right:-1px;border-width:0 2px 2px 0;}

#m-tit{font-family:‘Bebas Neue’,sans-serif;font-size:21px;color:#C9A84C;letter-spacing:4px;text-align:center;}
#m-sub{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:rgba(180,150,80,0.38);text-align:center;margin-bottom:8px;}
#m-dsc{font-size:13px;color:rgba(208,196,175,0.85);line-height:1.5;margin-bottom:8px;text-align:center;}
#m-quo{font-size:12px;color:#9B1020;font-style:italic;text-align:center;padding:5px 8px;border-left:2px solid #7B1020;margin-bottom:12px;background:rgba(123,16,32,0.07);}

.mb-p:hover{background:#9B1828;}
.mb-s{background:rgba(180,150,80,0.09);color:#C9A84C;border:1px solid rgba(180,150,80,0.22);}
.mb-s:hover{background:rgba(180,150,80,0.18);}
#m-x{position:absolute;top:7px;right:9px;background:none;border:none;color:rgba(180,150,80,0.38);font-size:16px;cursor:pointer;}
#m-x:hover{color:#C9A84C;}

#toast{
position:fixed;bottom:56px;left:50%;transform:translateX(-50%);
background:rgba(6,8,5,0.95);border:1px solid rgba(180,150,80,0.3);
border-radius:3px;padding:7px 14px;color:#C9A84C;
font-family:‘Rajdhani’,sans-serif;font-size:12px;font-weight:600;
letter-spacing:1px;z-index:600;max-width:80vw;text-align:center;
opacity:0;transition:opacity .4s;pointer-events:none;
}
</style>

</head>

// ============================================================
// BUILD MAP STATICA
// ============================================================
function buildMap(){
  const img = document.getElementById('map-img');
  const wrap = document.getElementById('map-wrap');
  const area = document.getElementById('map-area');

  // Calcola dimensione mappa per riempire area disponibile
  const areaW = area.clientWidth;
  const areaH = area.clientHeight;
  const ratio  = MAP_W_REF / MAP_H_REF;
  let mw = areaW;
  let mh = mw / ratio;
  if(mh > areaH){ mh = areaH; mw = mh * ratio; }

  wrap.style.width  = mw + 'px';
  wrap.style.height = mh + 'px';
  img.style.width   = mw + 'px';
  img.style.height  = mh + 'px';

  // Scale factor da coordinate originali a display
  const sx = mw / MAP_W_REF;
  const sy = mh / MAP_H_REF;

  // Rimuovi porte vecchie
  document.querySelectorAll('.door').forEach(e=>e.remove());

  // Crea porte
  DOORS.forEach(d=>{
    const el = document.createElement('div');
    el.className = 'door' + (d.locked ? ' locked' : '');
    el.style.left = (d.x * sx) + 'px';
    el.style.top  = (d.y * sy) + 'px';

    const body = document.createElement('div');
    body.className = 'door-body';

    const tip = document.createElement('div');
    tip.className = 'door-tip';
    tip.textContent = d.name;

    el.appendChild(body);
    el.appendChild(tip);
    el.addEventListener('pointerdown', e=>{ e.stopPropagation(); openModal(d); });
    wrap.appendChild(el);
  });
}

// ============================================================
// MODAL
// ============================================================
function openModal(d){
  if(d.locked){ toast('ACCESSO NEGATO — Richiede permesso del Comando'); return; }
  document.getElementById('m-ico').textContent = d.ico;
  document.getElementById('m-tit').textContent = d.name;
  document.getElementById('m-sub').textContent = d.sub;
  document.getElementById('m-dsc').textContent = d.dsc;
  document.getElementById('m-quo').textContent = '"' + d.quo + '"';
  const act = document.getElementById('m-act'); act.innerHTML='';
  if(d.act==='battle') addBtn(act,'SFIDA',true,()=>{closeModal();toast('Sistema battaglia — prossimo aggiornamento!');});
  if(d.act==='train')  addBtn(act,'ALLENATI',true,()=>{closeModal();doTrain();});
  if(d.act==='sleep')  addBtn(act,'DORMI (+1 giorno)',true,()=>{closeModal();doSleep();});
  if(d.act==='bar')    addBtn(act,'ENTRA AL BAR',true,()=>{closeModal();doBar();});
  if(d.act==='eat')    addBtn(act,'MANGIA',true,()=>{closeModal();doEat();});
  if(d.act==='heal')   addBtn(act,'RIPOSA',true,()=>{closeModal();doHeal();});
  addBtn(act,'CHIUDI',false,closeModal);
  document.getElementById('modal').classList.add('show');
}
function addBtn(par,txt,primary,fn){
  const b=document.createElement('button');
  b.className='mb '+(primary?'mb-p':'mb-s');
  b.textContent=txt;b.onclick=fn;par.appendChild(b);
}
function closeModal(){ document.getElementById('modal').classList.remove('show'); }
document.getElementById('m-x').onclick=closeModal;
document.getElementById('modal').addEventListener('click',e=>{ if(e.target===document.getElementById('modal'))closeModal(); });

// ============================================================
// AZIONI
// ============================================================
function doTrain(){player.forza=Math.min(99,player.forza+Math.floor(Math.random()*3)+1);player.disc=Math.min(99,player.disc+1);updHud();toast('"'+FRASI[Math.floor(Math.random()*FRASI.length)]+'"');}
function doSleep(){player.giorno++;player.spirito=Math.min(99,player.spirito+2);document.getElementById('dv').textContent=player.giorno;updHud();toast('Hai dormito. Giorno '+player.giorno);}
function doBar()  {player.spirito=Math.min(99,player.spirito+3);updHud();toast('"Alla Porta!" — Spirito +3. Weee naja!');}
function doEat()  {player.spirito=Math.min(99,player.spirito+1);player.forza=Math.min(99,player.forza+1);updHud();toast('Pasta scotta. Forza +1, Spirito +1.');}
function doHeal() {player.forza=Math.min(99,player.forza+4);updHud();toast('Infermeria. Forza +4.');}
function updHud() {
  document.getElementById('h-for').textContent=player.forza;
  document.getElementById('h-spi').textContent=player.spirito;
  document.getElementById('h-dis').textContent=player.disc;
  document.getElementById('lanci-val').textContent=player.lanci;
}
let toastT=null;
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.opacity='1';
  if(toastT)clearTimeout(toastT);
  toastT=setTimeout(()=>t.style.opacity='0',2800);
}

// ============================================================
// LOGIN
// ============================================================
const inN=document.getElementById('inp-nome'),inC=document.getElementById('inp-cogn'),bS=document.getElementById('btn-start');
function chkLogin(){bS.disabled=!(inN.value.trim()&&inC.value.trim());document.getElementById('err-msg').classList.remove('show');}
inN.addEventListener('input',chkLogin);inC.addEventListener('input',chkLogin);
inN.addEventListener('keydown',e=>{if(e.key==='Enter')inC.focus();});
inC.addEventListener('keydown',e=>{if(e.key==='Enter'&&!bS.disabled)bS.click();});
bS.addEventListener('click',()=>{
  const n=inN.value.trim(),c=inC.value.trim();
  if(!n||!c){document.getElementById('err-msg').classList.add('show');return;}
  player.nome=n;player.cognome=c;
  document.getElementById('hud-name').textContent='SOLDATO '+c.toUpperCase();
  document.getElementById('screen-login').style.display='none';
  document.getElementById('screen-map').classList.add('show');
  // buildMap dopo che il layout e visibile
  requestAnimationFrame(()=>{ requestAnimationFrame(()=>{ buildMap(); }); });
  setTimeout(()=>toast('"Weee naja! Benvenuto Soldato '+c+'"'),400);
});
</script>
