<!DOCTYPE html>

<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PARACA!</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Bebas+Neue&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{--amaranto:#7B1020;--oro:#C9A84C;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{width:100vw;height:100vh;overflow:hidden;background:#0a0a0a;font-family:'Rajdhani',sans-serif;}

/* LOGIN */
#screen-login{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:32px;}
#bg-login{position:absolute;inset:0;background:url(‘bg.png’) center top/cover no-repeat;z-index:0;}
#bg-login::after{content:’’;position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,0) 50%,rgba(0,0,0,0.22) 100%);}
#login-title{position:absolute;top:8px;left:0;right:0;text-align:center;z-index:2;pointer-events:none;}
#login-title h1{font-family:‘Black Han Sans’,sans-serif;font-size:clamp(68px,14vw,128px);color:#7B1020;text-shadow:4px 4px 0 #3d000a,7px 7px 0 rgba(0,0,0,0.2);line-height:1;animation:titlePulse 4s ease-in-out infinite;}
@keyframes titlePulse{0%,100%{color:#7B1020;}50%{color:#8B1828;text-shadow:4px 4px 0 #3d000a,7px 7px 0 rgba(0,0,0,0.2),0 0 40px rgba(123,16,32,0.3);}}
#popup{position:relative;z-index:2;background:rgba(235,226,206,0.87);border:2px solid rgba(123,16,32,0.35);border-radius:4px;padding:14px 20px 18px;width:min(320px,86vw);backdrop-filter:blur(10px);box-shadow:0 8px 32px rgba(0,0,0,0.25);}
#popup::before,#popup::after{content:’’;position:absolute;width:11px;height:11px;border-color:rgba(123,16,32,0.55);border-style:solid;}
#popup::before{top:-1px;left:-1px;border-width:2px 0 0 2px;}
#popup::after{bottom:-1px;right:-1px;border-width:0 2px 2px 0;}
.p-head{text-align:center;margin-bottom:10px;padding-bottom:9px;border-bottom:1px solid rgba(123,16,32,0.18);}
.p-head .lbl{font-size:9px;letter-spacing:5px;text-transform:uppercase;color:rgba(123,16,32,0.5);}
.p-head .rank{font-family:‘Bebas Neue’,sans-serif;font-size:20px;color:#7B1020;letter-spacing:5px;}
.frow{margin-bottom:8px;}
.flbl{font-size:9px;letter-spacing:4px;text-transform:uppercase;color:rgba(80,30,30,0.55);margin-bottom:3px;}
.finp{width:100%;background:rgba(255,255,255,0.55);border:1px solid rgba(123,16,32,0.25);border-radius:2px;padding:7px 10px;color:#2a0a0a;font-family:‘Rajdhani’,sans-serif;font-size:15px;font-weight:600;letter-spacing:2px;outline:none;transition:border-color .2s,background .2s;}
.finp:focus{border-color:rgba(123,16,32,0.6);background:rgba(255,255,255,0.78);}
.finp::placeholder{color:rgba(80,30,30,0.28);font-weight:400;}
#err-msg{font-size:10px;color:#7B1020;letter-spacing:1px;text-align:center;height:12px;margin-top:4px;opacity:0;transition:opacity .3s;}
#err-msg.show{opacity:1;}
#btn-start{width:100%;margin-top:12px;padding:10px;background:#7B1020;border:none;border-radius:2px;color:#fff;font-family:‘Bebas Neue’,sans-serif;font-size:18px;letter-spacing:6px;cursor:pointer;box-shadow:0 3px 12px rgba(123,16,32,0.3);transition:background .2s,transform .1s;}
#btn-start:hover{background:#9B1828;}
#btn-start:active{transform:scale(0.98);}
#btn-start:disabled{background:rgba(140,120,110,0.4);cursor:not-allowed;box-shadow:none;}

/* MAPPA */
#screen-map{position:fixed;inset:0;z-index:50;display:none;background:#0a0a0a;}
#screen-map.show{display:block;}
#hud{position:absolute;top:0;left:0;right:0;height:44px;background:rgba(6,8,5,0.96);border-bottom:1px solid rgba(180,150,80,0.25);display:flex;align-items:center;padding:0 10px;z-index:300;gap:7px;}
.hud-title{font-family:‘Black Han Sans’,sans-serif;font-size:19px;color:#7B1020;text-shadow:2px 2px 0 #3d000a;}
.hud-stat{font-family:‘Rajdhani’,sans-serif;font-size:11px;font-weight:700;color:#c0aa80;letter-spacing:1px;white-space:nowrap;}
.hud-stat b{color:#C9A84C;font-size:13px;}
.hsep{color:rgba(180,150,80,0.2);}
#hud-name{margin-left:auto;font-family:‘Bebas Neue’,sans-serif;font-size:12px;color:rgba(180,150,80,0.7);letter-spacing:3px;white-space:nowrap;}
#map-vp{position:absolute;top:44px;left:0;right:0;bottom:52px;overflow:hidden;touch-action:none;}
#map-world{position:absolute;transform-origin:0 0;}
#map-bg{position:absolute;top:0;left:0;display:block;}
#path-canvas{position:absolute;top:0;left:0;pointer-events:none;z-index:5;}

/* PORTE SCI-FI */
.door{position:absolute;z-index:20;cursor:pointer;width:18px;height:12px;transform:translate(-50%,-50%);}
.door-inner{width:100%;height:100%;background:rgba(201,168,76,0.12);border:1.5px solid #C9A84C;border-radius:2px;position:relative;animation:doorPulse 2s ease-in-out infinite;box-shadow:0 0 8px rgba(201,168,76,0.55),inset 0 0 4px rgba(201,168,76,0.15);}
.door-inner::before{content:’’;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:5px;height:5px;background:#C9A84C;border-radius:50%;box-shadow:0 0 6px #C9A84C;}
.door-inner::after{content:’’;position:absolute;top:-4px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:4px solid transparent;border-right:4px solid transparent;border-bottom:4px solid rgba(201,168,76,0.8);}
.door.locked .door-inner{border-color:#c0392b;box-shadow:0 0 8px rgba(192,57,43,0.6),inset 0 0 4px rgba(192,57,43,0.15);background:rgba(192,57,43,0.08);animation:doorPulseLocked 2s ease-in-out infinite;}
.door.locked .door-inner::before{background:#c0392b;box-shadow:0 0 6px #c0392b;}
.door.locked .door-inner::after{border-bottom-color:rgba(192,57,43,0.8);}
@keyframes doorPulse{0%,100%{box-shadow:0 0 5px rgba(201,168,76,0.4);}50%{box-shadow:0 0 14px rgba(201,168,76,0.9),inset 0 0 6px rgba(201,168,76,0.25);}}
@keyframes doorPulseLocked{0%,100%{box-shadow:0 0 5px rgba(192,57,43,0.4);}50%{box-shadow:0 0 14px rgba(192,57,43,0.9),inset 0 0 6px rgba(192,57,43,0.25);}}

/* PLAYER */
#player{position:absolute;width:18px;height:18px;z-index:30;pointer-events:none;}
#pspr{width:18px;height:18px;background:#7B1020;border-radius:50% 50% 40% 40%;border:1.5px solid #C9A84C;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.8);position:relative;}
#pspr::before{content:’’;position:absolute;top:-5px;left:50%;transform:translateX(-50%);width:12px;height:5px;background:#2a1a05;border-radius:2px 2px 0 0;border:1px solid #C9A84C;}
#pdot{width:5px;height:5px;background:#fff;border-radius:50%;}
#player::after{content:’’;position:absolute;bottom:-3px;left:50%;transform:translateX(-50%);width:11px;height:4px;background:rgba(0,0,0,0.35);border-radius:50%;}

/* DPAD */
#dpad{position:absolute;bottom:60px;left:12px;width:108px;height:108px;z-index:200;}
.db{position:absolute;width:33px;height:33px;background:rgba(6,8,5,0.85);border:1.5px solid rgba(180,150,80,0.38);border-radius:5px;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;-webkit-user-select:none;font-size:12px;color:rgba(220,200,150,0.8);transition:background .1s,transform .1s;}
.db:active,.db.on{background:rgba(123,16,32,0.88);transform:scale(0.88);border-color:rgba(200,40,40,0.65);}
#du{top:0;left:37px;}#dd{bottom:0;left:37px;}#dl{top:37px;left:0;}#dr{top:37px;right:0;}
#dc{position:absolute;top:37px;left:37px;width:33px;height:33px;background:rgba(6,8,5,0.45);border-radius:4px;}
#zoom-ctrl{position:absolute;bottom:60px;right:10px;display:flex;flex-direction:column;gap:5px;z-index:200;}
.zb{width:30px;height:30px;background:rgba(6,8,5,0.85);border:1.5px solid rgba(180,150,80,0.38);border-radius:5px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;color:rgba(220,200,150,0.8);transition:background .1s;}
.zb:active{background:rgba(123,16,32,0.88);}
#bottom-bar{position:absolute;bottom:0;left:0;right:0;height:52px;background:rgba(6,8,5,0.94);border-top:1px solid rgba(180,150,80,0.18);display:flex;align-items:center;justify-content:center;gap:22px;z-index:200;}
.bb-item{text-align:center;}
.bb-lbl{font-size:8px;letter-spacing:3px;color:rgba(180,150,80,0.45);text-transform:uppercase;display:block;}
.bb-val{font-family:‘Bebas Neue’,sans-serif;font-size:17px;color:#C9A84C;letter-spacing:2px;}

/* MODAL */
#modal{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,0.72);display:none;align-items:center;justify-content:center;}
#modal.show{display:flex;}
#mbox{background:rgba(10,12,8,0.98);border:2px solid rgba(180,150,80,0.38);border-radius:4px;padding:18px 22px;width:min(350px,90vw);position:relative;box-shadow:0 24px 80px rgba(0,0,0,0.9);animation:mIn .18s ease;}
@keyframes mIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
#mbox::before,#mbox::after{content:’’;position:absolute;width:10px;height:10px;border-color:rgba(180,150,80,0.55);border-style:solid;}
#mbox::before{top:-1px;left:-1px;border-width:2px 0 0 2px;}
#mbox::after{bottom:-1px;right:-1px;border-width:0 2px 2px 0;}
#m-ico{font-size:32px;text-align:center;margin-bottom:4px;}
#m-tit{font-family:‘Bebas Neue’,sans-serif;font-size:22px;color:#C9A84C;letter-spacing:4px;text-align:center;}
#m-sub{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:rgba(180,150,80,0.38);text-align:center;margin-bottom:9px;}
#m-dsc{font-size:13px;color:rgba(208,196,175,0.85);line-height:1.55;margin-bottom:9px;text-align:center;}
#m-quo{font-size:12px;color:#9B1020;font-style:italic;text-align:center;padding:5px 9px;border-left:2px solid #7B1020;margin-bottom:13px;background:rgba(123,16,32,0.07);}
.mb{width:100%;padding:8px;margin-bottom:5px;border:none;border-radius:2px;cursor:pointer;font-family:‘Bebas Neue’,sans-serif;font-size:14px;letter-spacing:4px;transition:background .2s;}
.mb-p{background:#7B1020;color:#fff;box-shadow:0 3px 10px rgba(123,16,32,0.28);}
.mb-p:hover{background:#9B1828;}
.mb-s{background:rgba(180,150,80,0.09);color:#C9A84C;border:1px solid rgba(180,150,80,0.22);}
.mb-s:hover{background:rgba(180,150,80,0.18);}
#m-x{position:absolute;top:7px;right:9px;background:none;border:none;color:rgba(180,150,80,0.38);font-size:16px;cursor:pointer;}
#m-x:hover{color:#C9A84C;}
#toast{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:rgba(6,8,5,0.95);border:1px solid rgba(180,150,80,0.3);border-radius:3px;padding:7px 14px;color:#C9A84C;font-family:‘Rajdhani’,sans-serif;font-size:13px;font-weight:600;letter-spacing:1px;z-index:600;max-width:78vw;text-align:center;opacity:0;transition:opacity .4s;pointer-events:none;}
</style>

</head>
<body>

  {id:'grd',  x:790,y:540, locked:true,  ico:'🔒', name:'GUARDIE / INGRESSO',sub:'ACCESSO RISERVATO',            dsc:'Checkpoint principale. Solo con lasciapassare.',                           quo:'Non lo fare il chamber check della merda!'            },
];

// ============================================================
// PATH ENGINE
// ============================================================
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function dist2(ax,ay,bx,by){return (ax-bx)**2+(ay-by)**2;}

function closestOnSeg(px,py,x1,y1,x2,y2){
  const dx=x2-x1,dy=y2-y1,len2=dx*dx+dy*dy;
  if(len2===0)return{x:x1,y:y1,t:0};
  const t=clamp(((px-x1)*dx+(py-y1)*dy)/len2,0,1);
  return{x:x1+t*dx,y:y1+t*dy,t};
}

function snapToPath(px,py){
  let best=null,bd=Infinity;
  for(const s of SEGS){
    const p=closestOnSeg(px,py,...s);
    const d=dist2(px,py,p.x,p.y);
    if(d<bd){bd=d;best=p;}
  }
  return best||{x:px,y:py};
}

// Trova il segmento su cui il giocatore e piu vicino
function currentSeg(px,py){
  let best=null,bd=Infinity;
  for(const s of SEGS){
    const p=closestOnSeg(px,py,...s);
    const d=dist2(px,py,p.x,p.y);
    if(d<bd){bd=d;best=s;}
  }
  return best;
}

const SNAP_DIST=18; // max distanza per cambiare segmento a un incrocio

function movePlayer(px,py,dx,dy,speed){
  const seg=currentSeg(px,py);
  if(!seg)return{x:px,y:py};
  const [x1,y1,x2,y2]=seg;
  const isH=Math.abs(x2-x1)>Math.abs(y2-y1);

  // Prova movimento sul segmento corrente
  if(isH&&dx!==0){
    const nx=clamp(px+dx*speed,Math.min(x1,x2),Math.max(x1,x2));
    return{x:nx,y:(y1+y2)/2};
  }
  if(!isH&&dy!==0){
    const ny=clamp(py+dy*speed,Math.min(y1,y2),Math.max(y1,y2));
    return{x:(x1+x2)/2,y:ny};
  }

  // Direzione trasversale: cerca segmento connesso vicino nella direzione giusta
  for(const s of SEGS){
    if(s===seg)continue;
    const [ax1,ay1,ax2,ay2]=s;
    const sIsH=Math.abs(ax2-ax1)>Math.abs(ay2-ay1);
    if(sIsH===isH)continue; // stesso orientamento, salta
    // Controlla se c'e un endpoint del segmento s vicino al player
    const pts=[[ax1,ay1],[ax2,ay2]];
    for(const[jx,jy]of pts){
      if(dist2(px,py,jx,jy)<SNAP_DIST*SNAP_DIST){
        // c'e un incrocio qui — prova a muoversi sul nuovo segmento
        if(sIsH&&dx!==0){
          const nx=clamp(jx+dx*speed,Math.min(ax1,ax2),Math.max(ax1,ax2));
          return{x:nx,y:(ay1+ay2)/2};
        }
        if(!sIsH&&dy!==0){
          const ny=clamp(jy+dy*speed,Math.min(ay1,ay2),Math.max(ay1,ay2));
          return{x:(ax1+ax2)/2,y:ny};
        }
      }
    }
  }
  return{x:px,y:py};
}

// ============================================================
// STATO
// ============================================================
const FRASI=["Vai a terra!","Pompa! Pompa cazzo!","Stai sul pezzo della merda!","Non sei idoneo alla vita!","Ti devi muovere! Ti devi muovere!","Sei massiccio cazzo!","Eccezzionale!","Serra piombo!","Jonny andiamo!","Dai Jonny cazzo!","Non sei presente a te stesso!","Cagnaccio!","Cane cane cane cane!","Ma lo vedi che non sei idoneo!","Non lo fare il chamber check della merda!","Io ti dico signorsi! E tu dici sissignore!","Cavallo! Cavallo! Meeeglio!","Non farti mangiare il cazzo dalle mosche!","Vecchio!","Weee naja!","Liberta per gli ultra! Tornado forza naja in arrivo!"];
const player={nome:'',cognome:'',forza:10,spirito:10,disc:10,giorno:1,lanci:0};
let px=460,py=215,zoom=0.7;

// ============================================================
// BUILD MAP
// ============================================================
function buildMap(){
  const img=document.getElementById('map-bg');
  img.style.width=MAP_W+'px'; img.style.height=MAP_H+'px';
  const world=document.getElementById('map-world');
  world.style.width=MAP_W+'px'; world.style.height=MAP_H+'px';

  // Canvas percorsi
  const canvas=document.getElementById('path-canvas');
  canvas.width=MAP_W; canvas.height=MAP_H;
  canvas.style.width=MAP_W+'px'; canvas.style.height=MAP_H+'px';
  const ctx=canvas.getContext('2d');

  // Ombra percorso
  ctx.strokeStyle='rgba(201,168,76,0.13)';
  ctx.lineWidth=16; ctx.lineCap='round';
  for(const[x1,y1,x2,y2]of SEGS){ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();}
  // Linea centrale sottile
  ctx.strokeStyle='rgba(201,168,76,0.22)';
  ctx.lineWidth=3;
  for(const[x1,y1,x2,y2]of SEGS){ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();}
  // Punti di incrocio
  ctx.fillStyle='rgba(201,168,76,0.35)';
  for(const[x1,y1,x2,y2]of SEGS){
    ctx.beginPath();ctx.arc(x1,y1,4,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(x2,y2,4,0,Math.PI*2);ctx.fill();
  }

  // Rimuovi porte vecchie
  document.querySelectorAll('.door').forEach(e=>e.remove());

  // Crea porte
  DOORS.forEach(d=>{
    const el=document.createElement('div');
    el.className='door'+(d.locked?' locked':'');
    el.style.left=d.x+'px'; el.style.top=d.y+'px';
    const inner=document.createElement('div');
    inner.className='door-inner';
    el.appendChild(inner);
    el.addEventListener('pointerdown',e=>{e.stopPropagation();openModal(d);});
    world.insertBefore(el,document.getElementById('player'));
  });
}

// ============================================================
// CAMERA
// ============================================================
function updateCam(){
  const vp=document.getElementById('map-vp');
  const vpW=vp.clientWidth,vpH=vp.clientHeight;
  const sW=MAP_W*zoom,sH=MAP_H*zoom;
  let ox=vpW/2-px*zoom, oy=vpH/2-py*zoom;
  ox=Math.min(0,Math.max(ox,vpW-sW));
  oy=Math.min(0,Math.max(oy,vpH-sH));
  document.getElementById('map-world').style.transform=`translate(${ox}px,${oy}px) scale(${zoom})`;
  const pel=document.getElementById('player');
  pel.style.left=(px-9)+'px'; pel.style.top=(py-9)+'px';
}

// ============================================================
// MOVIMENTO
// ============================================================
const SPEED=5;
let moveIv=null;
const dirs={du:[0,-1],dd:[0,1],dl:[-1,0],dr:[1,0]};

function startMove(id){
  stopMove();
  document.getElementById(id)?.classList.add('on');
  const[dx,dy]=dirs[id];
  function step(){
    const np=movePlayer(px,py,dx,dy,SPEED);
    px=np.x; py=np.y; updateCam();
  }
  step(); moveIv=setInterval(step,55);
}
function stopMove(){
  if(moveIv){clearInterval(moveIv);moveIv=null;}
  document.querySelectorAll('.db').forEach(b=>b.classList.remove('on'));
}

['du','dd','dl','dr'].forEach(id=>{
  const btn=document.getElementById(id);
  btn.addEventListener('pointerdown',e=>{e.preventDefault();startMove(id);});
  btn.addEventListener('pointerup',  e=>{e.preventDefault();stopMove();});
  btn.addEventListener('pointerleave',e=>{e.preventDefault();stopMove();});
});
const KB={'ArrowUp':'du','ArrowDown':'dd','ArrowLeft':'dl','ArrowRight':'dr','w':'du','s':'dd','a':'dl','d':'dr'};
const held={};
document.addEventListener('keydown',e=>{if(!held[e.key]&&KB[e.key]){held[e.key]=true;startMove(KB[e.key]);}});
document.addEventListener('keyup',  e=>{held[e.key]=false;stopMove();});

document.getElementById('zi').onclick=()=>{zoom=Math.min(2.2,zoom+0.2);updateCam();};
document.getElementById('zo').onclick=()=>{zoom=Math.max(0.3,zoom-0.2);updateCam();};
let lpd=null;
const vpEl=document.getElementById('map-vp');
vpEl.addEventListener('touchstart',e=>{if(e.touches.length===2)lpd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);},{passive:true});
vpEl.addEventListener('touchmove', e=>{if(e.touches.length===2&&lpd){const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);zoom=Math.max(0.3,Math.min(2.2,zoom+(d-lpd)*0.006));lpd=d;updateCam();}},{passive:true});

// ============================================================
// MODAL
// ============================================================
function openModal(d){
  if(d.locked){toast('ACCESSO NEGATO — Richiede permesso del Comando');return;}
  document.getElementById('m-ico').textContent=d.ico;
  document.getElementById('m-tit').textContent=d.name;
  document.getElementById('m-sub').textContent=d.sub;
  document.getElementById('m-dsc').textContent=d.dsc;
  document.getElementById('m-quo').textContent='"'+d.quo+'"';
  const act=document.getElementById('m-act'); act.innerHTML='';
  if(d.act==='battle')addBtn(act,'SFIDA',true,()=>{closeModal();toast('Sistema battaglia — prossimo aggiornamento!');});
  if(d.act==='train') addBtn(act,'ALLENATI',true,()=>{closeModal();doTrain();});
  if(d.act==='sleep') addBtn(act,'DORMI (+1 giorno)',true,()=>{closeModal();doSleep();});
  if(d.act==='bar')   addBtn(act,'ENTRA AL BAR',true,()=>{closeModal();doBar();});
  if(d.act==='eat')   addBtn(act,'MANGIA',true,()=>{closeModal();doEat();});
  if(d.act==='heal')  addBtn(act,'RIPOSA',true,()=>{closeModal();doHeal();});
  addBtn(act,'CHIUDI',false,closeModal);
  document.getElementById('modal').classList.add('show');
}
function addBtn(par,txt,primary,fn){const b=document.createElement('button');b.className='mb '+(primary?'mb-p':'mb-s');b.textContent=txt;b.onclick=fn;par.appendChild(b);}
function closeModal(){document.getElementById('modal').classList.remove('show');}
document.getElementById('m-x').onclick=closeModal;
document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))closeModal();});

// ACTIONS
function doTrain(){player.forza=Math.min(99,player.forza+Math.floor(Math.random()*3)+1);player.disc=Math.min(99,player.disc+1);updHud();toast('"'+FRASI[Math.floor(Math.random()*FRASI.length)]+'"');}
function doSleep(){player.giorno++;player.spirito=Math.min(99,player.spirito+2);document.getElementById('dv').textContent=player.giorno;updHud();toast('Hai dormito. Giorno '+player.giorno);}
function doBar()  {player.spirito=Math.min(99,player.spirito+3);updHud();toast('"Alla Porta!" — Spirito +3. Weee naja!');}
function doEat()  {player.spirito=Math.min(99,player.spirito+1);player.forza=Math.min(99,player.forza+1);updHud();toast('Pasta scotta ma calda. Forza +1, Spirito +1.');}
function doHeal() {player.forza=Math.min(99,player.forza+4);updHud();toast('Infermeria. Forza +4.');}
function updHud() {document.getElementById('h-for').textContent=player.forza;document.getElementById('h-spi').textContent=player.spirito;document.getElementById('h-dis').textContent=player.disc;document.getElementById('lanci-val').textContent=player.lanci;}
let toastT=null;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.opacity='1';if(toastT)clearTimeout(toastT);toastT=setTimeout(()=>t.style.opacity='0',2800);}

// LOGIN
const inN=document.getElementById('inp-nome'),inC=document.getElementById('inp-cogn'),bS=document.getElementById('btn-start');
function chkLogin(){bS.disabled=!(inN.value.trim()&&inC.value.trim());document.getElementById('err-msg').classList.remove('show');}
inN.addEventListener('input',chkLogin); inC.addEventListener('input',chkLogin);
inN.addEventListener('keydown',e=>{if(e.key==='Enter')inC.focus();});
inC.addEventListener('keydown',e=>{if(e.key==='Enter'&&!bS.disabled)bS.click();});
bS.addEventListener('click',()=>{
  const n=inN.value.trim(),c=inC.value.trim();
  if(!n||!c){document.getElementById('err-msg').classList.add('show');return;}
  player.nome=n;player.cognome=c;
  document.getElementById('hud-name').textContent='SOLDATO '+c.toUpperCase();
  document.getElementById('screen-login').style.display='none';
  document.getElementById('screen-map').classList.add('show');
  buildMap();
  const st=snapToPath(460,215); px=st.x; py=st.y; zoom=0.7; updateCam();
  setTimeout(()=>toast('"Weee naja! Benvenuto Soldato '+c+'"'),700);
});
</script>
