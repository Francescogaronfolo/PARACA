*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a0a;font-family:'Rajdhani',sans-serif;}

/* LOGIN */
#screen-login{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;}
#bg-login{position:absolute;inset:0;background-size:cover;background-position:center;z-index:0;}
#bg-login::after{content:’’;position:absolute;inset:0;background:rgba(0,0,0,0.32);}
#login-title{position:absolute;top:50%;left:0;right:0;transform:translateY(-160px);text-align:center;z-index:2;pointer-events:none;}
#login-title h1{font-family:‘Black Han Sans’,sans-serif;font-size:clamp(48px,12vw,100px);color:#7B1020;text-shadow:4px 4px 0 #3d000a,7px 7px 0 rgba(0,0,0,0.2);line-height:1;animation:tp 4s ease-in-out infinite;}
@keyframes tp{0%,100%{color:#7B1020;}50%{color:#8B1828;text-shadow:4px 4px 0 #3d000a,7px 7px 0 rgba(0,0,0,0.2),0 0 40px rgba(123,16,32,0.3);}}
#popup{position:relative;z-index:2;background:rgba(235,226,206,0.91);border:2px solid rgba(123,16,32,0.4);border-radius:4px;padding:14px 20px 18px;width:min(300px,80vw);backdrop-filter:blur(12px);box-shadow:0 8px 32px rgba(0,0,0,0.4);}
#popup::before,#popup::after{content:’’;position:absolute;width:11px;height:11px;border-color:rgba(123,16,32,0.6);border-style:solid;}
#popup::before{top:-1px;left:-1px;border-width:2px 0 0 2px;}
#popup::after{bottom:-1px;right:-1px;border-width:0 2px 2px 0;}
.p-head{text-align:center;margin-bottom:10px;padding-bottom:9px;border-bottom:1px solid rgba(123,16,32,0.2);}
.p-lbl{font-size:9px;letter-spacing:5px;text-transform:uppercase;color:rgba(123,16,32,0.5);}
.p-rank{font-family:‘Bebas Neue’,sans-serif;font-size:22px;color:#7B1020;letter-spacing:5px;}
.frow{margin-bottom:9px;}
.flbl{font-size:9px;letter-spacing:4px;text-transform:uppercase;color:rgba(80,30,30,0.55);margin-bottom:3px;}
.finp{width:100%;background:rgba(255,255,255,0.6);border:1px solid rgba(123,16,32,0.28);border-radius:2px;padding:7px 10px;color:#2a0a0a;font-family:‘Rajdhani’,sans-serif;font-size:15px;font-weight:600;letter-spacing:2px;outline:none;transition:border-color .2s;}
.finp:focus{border-color:rgba(123,16,32,0.7);background:rgba(255,255,255,0.85);}
.finp::placeholder{color:rgba(80,30,30,0.3);font-weight:400;}
#err-msg{font-size:10px;color:#7B1020;text-align:center;height:12px;margin-top:4px;opacity:0;transition:opacity .3s;}
#err-msg.show{opacity:1;}
#btn-start{width:100%;margin-top:12px;padding:10px;background:#7B1020;border:none;border-radius:2px;color:#fff;font-family:‘Bebas Neue’,sans-serif;font-size:18px;letter-spacing:6px;cursor:pointer;box-shadow:0 3px 12px rgba(123,16,32,0.35);transition:background .2s;}
#btn-start:hover{background:#9B1828;}
#btn-start:disabled{background:rgba(140,120,110,0.4);cursor:not-allowed;box-shadow:none;}

/* MAPPA */

.hs b{color:#C9A84C;font-size:12px;}
.hd{color:rgba(180,150,80,0.2);font-size:10px;}

#game-body{flex:1;display:flex;overflow:hidden;}
#map-area{flex:1;position:relative;display:flex;align-items:center;justify-content:center;background:#0d0d0d;overflow:hidden;}

#map-img{display:block;}

/* PUNTINI */
.door{position:absolute;cursor:pointer;width:14px;height:14px;transform:translate(-50%,-50%);z-index:10;}
.door-dot{width:100%;height:100%;border-radius:50%;background:radial-gradient(circle,#fff 0%,#C9A84C 45%,rgba(201,168,76,0.2) 75%,transparent 100%);box-shadow:0 0 8px rgba(201,168,76,0.8),0 0 3px #fff;animation:pd 2s ease-in-out infinite;}
.door-dot::after{content:’’;position:absolute;inset:-5px;border-radius:50%;border:1px solid rgba(201,168,76,0.4);animation:pr 2s ease-in-out infinite;}
.door.locked .door-dot{background:radial-gradient(circle,#fff 0%,#c0392b 45%,rgba(192,57,43,0.2) 75%,transparent 100%);box-shadow:0 0 8px rgba(192,57,43,0.8),0 0 3px #fff;animation:pdr 2s ease-in-out infinite;}
.door.locked .door-dot::after{border-color:rgba(192,57,43,0.4);}
@keyframes pd{0%,100%{box-shadow:0 0 6px rgba(201,168,76,0.6),0 0 2px #fff;transform:scale(1);}50%{box-shadow:0 0 14px rgba(201,168,76,1),0 0 5px #fff;transform:scale(1.2);}}
@keyframes pdr{0%,100%{box-shadow:0 0 6px rgba(192,57,43,0.6);}50%{box-shadow:0 0 14px rgba(192,57,43,1);transform:scale(1.2);}}
@keyframes pr{0%,100%{opacity:0.5;transform:scale(1);}50%{opacity:0;transform:scale(2);}}
.door-tip{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);background:rgba(6,8,5,0.96);border:1px solid rgba(201,168,76,0.4);border-radius:2px;padding:2px 7px;font-family:‘Rajdhani’,sans-serif;font-size:9px;font-weight:700;color:#C9A84C;letter-spacing:1px;white-space:nowrap;opacity:0;transition:opacity .15s;pointer-events:none;}
.door:hover .door-tip,.door:active .door-tip{opacity:1;}

/* HIGHLIGHT */
.bld-hl{position:absolute;pointer-events:none;z-index:8;border:2px solid #C9A84C;border-radius:4px;box-shadow:0 0 14px rgba(201,168,76,0.5),inset 0 0 8px rgba(201,168,76,0.08);background:rgba(201,168,76,0.04);animation:bhl .5s ease-out forwards;}
.bld-hl.locked{border-color:#c0392b;box-shadow:0 0 14px rgba(192,57,43,0.5);}
@keyframes bhl{from{opacity:0;transform:scale(0.93);}to{opacity:1;transform:scale(1);}}

function buildMap(){
  const area=document.getElementById('map-area');
  const wrap=document.getElementById('map-wrap');
  const img=document.getElementById('map-img');
  const aW=area.clientWidth, aH=area.clientHeight;
  const ratio=MW/MH;
  let mw=aW, mh=mw/ratio;
  if(mh>aH){mh=aH;mw=mh*ratio;}
  wrap.style.width=mw+'px'; wrap.style.height=mh+'px';
  img.style.width=mw+'px'; img.style.height=mh+'px';
  scaleX=mw/MW; scaleY=mh/MH;
  document.querySelectorAll('.door,.bld-hl').forEach(e=>e.remove());
  DOORS.forEach(d=>{
    const el=document.createElement('div');
    el.className='door'+(d.locked?' locked':'');
    el.style.left=(d.x*scaleX)+'px';
    el.style.top=(d.y*scaleY)+'px';
    const dot=document.createElement('div'); dot.className='door-dot';
    const tip=document.createElement('div'); tip.className='door-tip'; tip.textContent=d.name;
    el.appendChild(dot); el.appendChild(tip);
    el.addEventListener('pointerdown',e=>{e.stopPropagation();handleDoor(d);});
    wrap.appendChild(el);
  });
}

function handleDoor(d){
  showHL(d);
  if(d.locked){setTimeout(()=>toast('ACCESSO NEGATO'),200);return;}
  setTimeout(()=>openModal(d),250);
}

function showHL(d){
  document.querySelectorAll('.bld-hl').forEach(e=>e.remove());
  const wrap=document.getElementById('map-wrap');
  const hl=document.createElement('div');
  hl.className='bld-hl'+(d.locked?' locked':'');
  hl.style.left=(d.bx*scaleX)+'px';
  hl.style.top=(d.by*scaleY)+'px';
  hl.style.width=(d.bw*scaleX)+'px';
  hl.style.height=(d.bh*scaleY)+'px';
  wrap.appendChild(hl);
  setTimeout(()=>hl.remove(),2200);
}

function openModal(d){
  document.getElementById('m-ico').textContent=d.ico;
  document.getElementById('m-tit').textContent=d.name;
  document.getElementById('m-sub').textContent=d.sub;
  document.getElementById('m-dsc').textContent=d.dsc;
  document.getElementById('m-quo').textContent='"'+d.quo+'"';
  const act=document.getElementById('m-act'); act.innerHTML='';
  if(d.act==='battle')addBtn(act,'SFIDA',true,()=>{closeModal();toast('Sistema battaglia — in arrivo!');});
  if(d.act==='train') addBtn(act,'ALLENATI',true,()=>{closeModal();doTrain();});
  if(d.act==='sleep') addBtn(act,'DORMI (+1 giorno)',true,()=>{closeModal();doSleep();});
  if(d.act==='bar')   addBtn(act,'ENTRA',true,()=>{closeModal();doBar();});
  if(d.act==='eat')   addBtn(act,'MANGIA',true,()=>{closeModal();doEat();});
  if(d.act==='heal')  addBtn(act,'RIPOSA',true,()=>{closeModal();doHeal();});
  addBtn(act,'CHIUDI',false,closeModal);
  document.getElementById('modal').classList.add('show');
}
function addBtn(par,txt,primary,fn){const b=document.createElement('button');b.className='mb '+(primary?'mb-p':'mb-s');b.textContent=txt;b.onclick=fn;par.appendChild(b);}
function closeModal(){document.getElementById('modal').classList.remove('show');}
document.getElementById('m-x').onclick=closeModal;
document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))closeModal();});

function doTrain(){player.forza=Math.min(99,player.forza+Math.floor(Math.random()*3)+1);player.disc=Math.min(99,player.disc+1);updHud();toast('"'+FRASI[Math.floor(Math.random()*FRASI.length)]+'"');}
function doSleep(){player.giorno++;player.spirito=Math.min(99,player.spirito+2);updHud();toast('Hai dormito. Giorno '+player.giorno);}
function doBar()  {player.spirito=Math.min(99,player.spirito+3);updHud();toast('Weee naja! Spirito +3');}
function doEat()  {player.spirito=Math.min(99,player.spirito+1);player.forza=Math.min(99,player.forza+1);updHud();toast('Pasta scotta. Forza +1, Spirito +1.');}
function doHeal() {player.forza=Math.min(99,player.forza+4);updHud();toast('Infermeria. Forza +4.');}
function updHud(){
  document.getElementById('h-for').textContent=player.forza;
  document.getElementById('h-spi').textContent=player.spirito;
  document.getElementById('h-dis').textContent=player.disc;
  document.getElementById('sb-for').textContent=player.forza;
  document.getElementById('sb-spi').textContent=player.spirito;
  document.getElementById('sb-dis').textContent=player.disc;
  document.getElementById('sb-lan').textContent=player.lanci;
  document.getElementById('dv').textContent=player.giorno;
  document.getElementById('dv2').textContent=player.giorno;
  document.getElementById('lan-val').textContent=player.lanci;
}
let tt=null;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.opacity='1';if(tt)clearTimeout(tt);tt=setTimeout(()=>t.style.opacity='0',2800);}

const inN=document.getElementById('inp-nome'),inC=document.getElementById('inp-cogn'),bS=document.getElementById('btn-start');
function chk(){bS.disabled=!(inN.value.trim()&&inC.value.trim());document.getElementById('err-msg').classList.remove('show');}
inN.addEventListener('input',chk);inC.addEventListener('input',chk);
inN.addEventListener('keydown',e=>{if(e.key==='Enter')inC.focus();});
inC.addEventListener('keydown',e=>{if(e.key==='Enter'&&!bS.disabled)bS.click();});
bS.addEventListener('click',()=>{
  const n=inN.value.trim(),c=inC.value.trim();
  if(!n||!c){document.getElementById('err-msg').classList.add('show');return;}
  player.nome=n;player.cognome=c;
  document.getElementById('hud-name').textContent='SOLDATO '+c.toUpperCase();
  document.getElementById('screen-login').style.display='none';
  document.getElementById('screen-map').classList.add('show');
  requestAnimationFrame(()=>requestAnimationFrame(()=>buildMap()));
  setTimeout(()=>toast('"Weee naja! Benvenuto Soldato '+c+'"'),500);
});
document.getElementById('bg-login').style.backgroundImage="url('bg.png?v=5')";
</script>

</body>
</html>
