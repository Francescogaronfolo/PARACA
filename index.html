<!DOCTYPE html>

<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PARACA!</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Bebas+Neue&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a0a;font-family:'Rajdhani',sans-serif;}

/* RUOTA */
#rotate-msg{display:none;position:fixed;inset:0;z-index:9999;background:#0a0a0a;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
#rotate-msg .ico{font-size:56px;animation:rs 2s ease-in-out infinite;}
@keyframes rs{0%,100%{transform:rotate(0deg);}50%{transform:rotate(90deg);}}
#rotate-msg p{font-family:‘Bebas Neue’,sans-serif;font-size:20px;letter-spacing:4px;color:#C9A84C;text-align:center;}
@media(orientation:portrait){#rotate-msg{display:flex;}#screen-login,#screen-map{display:none!important;}}

/* LOGIN */
#screen-login{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;}
#bg-login{position:absolute;inset:0;background-size:cover;background-position:center;z-index:0;}
#bg-login::after{content:’’;position:absolute;inset:0;background:rgba(0,0,0,0.32);}

/* Titolo landscape: sopra al popup, non tagliato */
#login-title{
position:absolute;
top:50%;left:0;right:0;
transform:translateY(-168px); /* sopra al popup */
text-align:center;z-index:2;pointer-events:none;
}
#login-title h1{
font-family:‘Black Han Sans’,sans-serif;
font-size:clamp(42px,8vw,82px);
color:#7B1020;
text-shadow:3px 3px 0 #3d000a,5px 5px 0 rgba(0,0,0,0.25);
line-height:1;animation:tp 4s ease-in-out infinite;
}
@keyframes tp{0%,100%{color:#7B1020;}50%{color:#8B1828;text-shadow:3px 3px 0 #3d000a,5px 5px 0 rgba(0,0,0,0.2),0 0 28px rgba(123,16,32,0.4);}}

#popup{
position:relative;z-index:2;
background:rgba(235,226,206,0.91);border:2px solid rgba(123,16,32,0.4);
border-radius:4px;padding:14px 20px 16px;
width:min(260px,36vw);
backdrop-filter:blur(12px);box-shadow:0 8px 32px rgba(0,0,0,0.4);
}
#popup::before,#popup::after{content:’’;position:absolute;width:10px;height:10px;border-color:rgba(123,16,32,0.6);border-style:solid;}
#popup::before{top:-1px;left:-1px;border-width:2px 0 0 2px;}
#popup::after{bottom:-1px;right:-1px;border-width:0 2px 2px 0;}
.p-head{text-align:center;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid rgba(123,16,32,0.2);}
.p-lbl{font-size:8px;letter-spacing:5px;text-transform:uppercase;color:rgba(123,16,32,0.5);}
.p-rank{font-family:‘Bebas Neue’,sans-serif;font-size:19px;color:#7B1020;letter-spacing:5px;}
.frow{margin-bottom:7px;}
.flbl{font-size:8px;letter-spacing:4px;text-transform:uppercase;color:rgba(80,30,30,0.55);margin-bottom:3px;}
.finp{width:100%;background:rgba(255,255,255,0.6);border:1px solid rgba(123,16,32,0.28);border-radius:2px;padding:6px 9px;color:#2a0a0a;font-family:‘Rajdhani’,sans-serif;font-size:14px;font-weight:600;letter-spacing:2px;outline:none;transition:border-color .2s,background .2s;}
.finp:focus{border-color:rgba(123,16,32,0.7);background:rgba(255,255,255,0.85);}
.finp::placeholder{color:rgba(80,30,30,0.3);font-weight:400;}
#err-msg{font-size:9px;color:#7B1020;letter-spacing:1px;text-align:center;height:11px;margin-top:3px;opacity:0;transition:opacity .3s;}
#err-msg.show{opacity:1;}
#btn-start{width:100%;margin-top:10px;padding:9px;background:#7B1020;border:none;border-radius:2px;color:#fff;font-family:‘Bebas Neue’,sans-serif;font-size:17px;letter-spacing:6px;cursor:pointer;box-shadow:0 3px 12px rgba(123,16,32,0.35);transition:background .2s,transform .1s;}
#btn-start:hover{background:#9B1828;}
#btn-start:active{transform:scale(0.97);}
#btn-start:disabled{background:rgba(140,120,110,0.4);cursor:not-allowed;box-shadow:none;}

/* MAPPA */
#screen-map{position:fixed;inset:0;z-index:50;display:none;flex-direction:column;background:#0a0a0a;}
#screen-map.show{display:flex;}

#hud{flex-shrink:0;height:34px;background:rgba(6,8,5,0.97);border-bottom:1px solid rgba(180,150,80,0.18);display:flex;align-items:center;padding:0 10px;gap:7px;z-index:300;}
.ht{font-family:‘Black Han Sans’,sans-serif;font-size:15px;color:#7B1020;text-shadow:2px 2px 0 #3d000a;margin-right:3px;}
.hs{font-family:‘Rajdhani’,sans-serif;font-size:10px;font-weight:700;color:#c0aa80;letter-spacing:1px;white-space:nowrap;}
.hs b{color:#C9A84C;font-size:11px;}
.hd{color:rgba(180,150,80,0.18);font-size:10px;}
#hud-name{margin-left:auto;font-family:‘Bebas Neue’,sans-serif;font-size:10px;color:rgba(180,150,80,0.6);letter-spacing:3px;}

#game-body{flex:1;display:flex;overflow:hidden;}

#map-area{flex:1;position:relative;display:flex;align-items:center;justify-content:center;background:#0d0d0d;overflow:hidden;}
#map-wrap{position:relative;}
#map-img{display:block;image-rendering:auto;}

/* PORTE — piu piccole, piu eleganti */
.door{position:absolute;cursor:pointer;width:14px;height:9px;transform:translate(-50%,-50%);z-index:10;}
.door-body{
width:100%;height:100%;
border:1.5px solid #C9A84C;border-radius:2px;
background:rgba(201,168,76,0.08);position:relative;
animation:dp 2.5s ease-in-out infinite;
}
.door-body::before{content:’’;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:3px;height:3px;background:#C9A84C;border-radius:50%;box-shadow:0 0 4px #C9A84C;}
/* triangolino sopra */
.door-body::after{content:’’;position:absolute;top:-4px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:3px solid transparent;border-right:3px solid transparent;border-bottom:4px solid #C9A84C;}

.door.locked .door-body{border-color:#c0392b;background:rgba(192,57,43,0.06);animation:dpr 2.5s ease-in-out infinite;}
.door.locked .door-body::before{background:#c0392b;box-shadow:0 0 4px #c0392b;}
.door.locked .door-body::after{border-bottom-color:#c0392b;}

@keyframes dp{
0%,100%{box-shadow:0 0 4px rgba(201,168,76,0.4);border-color:rgba(201,168,76,0.7);}
50%{box-shadow:0 0 10px rgba(201,168,76,0.9),0 0 4px rgba(201,168,76,1);border-color:#C9A84C;}
}
@keyframes dpr{
0%,100%{box-shadow:0 0 4px rgba(192,57,43,0.4);}
50%{box-shadow:0 0 10px rgba(192,57,43,0.9);}
}
.door-tip{position:absolute;bottom:13px;left:50%;transform:translateX(-50%);background:rgba(6,8,5,0.96);border:1px solid rgba(201,168,76,0.45);border-radius:2px;padding:2px 6px;font-family:‘Rajdhani’,sans-serif;font-size:8px;font-weight:700;color:#C9A84C;letter-spacing:1px;white-space:nowrap;opacity:0;transition:opacity .15s;pointer-events:none;}
.door:hover .door-tip,.door:active .door-tip{opacity:1;}

/* SIDEBAR */
#sidebar{flex-shrink:0;width:110px;background:rgba(6,8,5,0.97);border-left:1px solid rgba(180,150,80,0.14);display:flex;flex-direction:column;padding:7px 6px;gap:6px;}
.sb-s{border:1px solid rgba(180,150,80,0.13);border-radius:3px;padding:5px 6px;}
.sb-l{font-size:7px;letter-spacing:3px;text-transform:uppercase;color:rgba(180,150,80,0.36);display:block;margin-bottom:3px;}
.sb-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;}
.sb-n{font-size:8px;color:rgba(200,180,140,0.6);letter-spacing:1px;}
.sb-v{font-family:‘Bebas Neue’,sans-serif;font-size:12px;color:#C9A84C;}
.sb-day{text-align:center;}
.sb-dv{font-family:‘Bebas Neue’,sans-serif;font-size:24px;color:#C9A84C;line-height:1;}
.sb-gr{font-family:‘Bebas Neue’,sans-serif;font-size:10px;color:rgba(180,150,80,0.5);letter-spacing:2px;margin-top:1px;}
.sb-hint{font-size:7px;color:rgba(180,150,80,0.45);line-height:1.6;}

/* MODAL */
#modal{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,0.78);display:none;align-items:center;justify-content:center;}
#modal.show{display:flex;}
#mbox{background:rgba(10,12,8,0.98);border:2px solid rgba(180,150,80,0.38);border-radius:4px;padding:16px 20px;width:min(300px,52vw);position:relative;box-shadow:0 24px 80px rgba(0,0,0,0.9);animation:mIn .18s ease;}
@keyframes mIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
#mbox::before,#mbox::after{content:’’;position:absolute;width:9px;height:9px;border-color:rgba(180,150,80,0.55);border-style:solid;}
#mbox::before{top:-1px;left:-1px;border-width:2px 0 0 2px;}
#mbox::after{bottom:-1px;right:-1px;border-width:0 2px 2px 0;}
#m-ico{font-size:26px;text-align:center;margin-bottom:2px;}
#m-tit{font-family:‘Bebas Neue’,sans-serif;font-size:19px;color:#C9A84C;letter-spacing:4px;text-align:center;}
#m-sub{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:rgba(180,150,80,0.38);text-align:center;margin-bottom:7px;}
#m-dsc{font-size:12px;color:rgba(208,196,175,0.85);line-height:1.5;margin-bottom:7px;text-align:center;}
#m-quo{font-size:11px;color:#9B1020;font-style:italic;text-align:center;padding:4px 7px;border-left:2px solid #7B1020;margin-bottom:11px;background:rgba(123,16,32,0.07);}
.mb{width:100%;padding:7px;margin-bottom:4px;border:none;border-radius:2px;cursor:pointer;font-family:‘Bebas Neue’,sans-serif;font-size:13px;letter-spacing:4px;transition:background .2s;}
.mb-p{background:#7B1020;color:#fff;}
.mb-p:hover{background:#9B1828;}
.mb-s{background:rgba(180,150,80,0.09);color:#C9A84C;border:1px solid rgba(180,150,80,0.22);}
.mb-s:hover{background:rgba(180,150,80,0.18);}
#m-x{position:absolute;top:6px;right:8px;background:none;border:none;color:rgba(180,150,80,0.38);font-size:15px;cursor:pointer;}
#m-x:hover{color:#C9A84C;}

#toast{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);background:rgba(6,8,5,0.95);border:1px solid rgba(180,150,80,0.3);border-radius:3px;padding:6px 13px;color:#C9A84C;font-family:‘Rajdhani’,sans-serif;font-size:11px;font-weight:600;letter-spacing:1px;z-index:600;max-width:68vw;text-align:center;opacity:0;transition:opacity .4s;pointer-events:none;}
</style>

</head>

function buildMap(){
  const area=document.getElementById('map-area');
  const wrap=document.getElementById('map-wrap');
  const img=document.getElementById('map-img');
  const aW=area.clientWidth,aH=area.clientHeight;
  const ratio=MW/MH;
  let mw=aW,mh=mw/ratio;
  if(mh>aH){mh=aH;mw=mh*ratio;}
  wrap.style.width=mw+'px';wrap.style.height=mh+'px';
  img.style.width=mw+'px';img.style.height=mh+'px';
  const sx=mw/MW,sy=mh/MH;
  document.querySelectorAll('.door').forEach(e=>e.remove());
  DOORS.forEach(d=>{
    const el=document.createElement('div');
    el.className='door'+(d.locked?' locked':'');
    el.style.left=(d.x*sx)+'px';
    el.style.top=(d.y*sy)+'px';
    const body=document.createElement('div');
    body.className='door-body';
    const tip=document.createElement('div');
    tip.className='door-tip';
    tip.textContent=d.name;
    el.appendChild(body);el.appendChild(tip);
    el.addEventListener('pointerdown',e=>{e.stopPropagation();openModal(d);});
    wrap.appendChild(el);
  });
}

function openModal(d){
  if(d.locked){toast('ACCESSO NEGATO — Richiede permesso del Comando');return;}
  document.getElementById('m-ico').textContent=d.ico;
  document.getElementById('m-tit').textContent=d.name;
  document.getElementById('m-sub').textContent=d.sub;
  document.getElementById('m-dsc').textContent=d.dsc;
  document.getElementById('m-quo').textContent='"'+d.quo+'"';
  const act=document.getElementById('m-act');act.innerHTML='';
  if(d.act==='battle')addBtn(act,'SFIDA',true,()=>{closeModal();toast('Sistema battaglia — prossimo aggiornamento!');});
  if(d.act==='train') addBtn(act,'ALLENATI',true,()=>{closeModal();doTrain();});
  if(d.act==='sleep') addBtn(act,'DORMI (+1 giorno)',true,()=>{closeModal();doSleep();});
  if(d.act==='bar')   addBtn(act,'ENTRA AL BAR',true,()=>{closeModal();doBar();});
  if(d.act==='eat')   addBtn(act,'MANGIA',true,()=>{closeModal();doEat();});
  if(d.act==='heal')  addBtn(act,'RIPOSA',true,()=>{closeModal();doHeal();});
  addBtn(act,'CHIUDI',false,closeModal);
  document.getElementById('modal').classList.add('show');
}
function addBtn(par,txt,primary,fn){const b=document.createElement('button');b.className='mb '+(primary?'mb-p':'mb-s');b.textContent=txt;b.onclick=fn;par.appendChild(b);}
function closeModal(){document.getElementById('modal').classList.remove('show');}
document.getElementById('m-x').onclick=closeModal;
document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))closeModal();});

function doTrain(){player.forza=Math.min(99,player.forza+Math.floor(Math.random()*3)+1);player.disc=Math.min(99,player.disc+1);updHud();toast('"'+FRASI[Math.floor(Math.random()*FRASI.length)]+'"');}
function doSleep(){player.giorno++;player.spirito=Math.min(99,player.spirito+2);document.getElementById('dv').textContent=player.giorno;updHud();toast('Hai dormito. Giorno '+player.giorno);}
function doBar()  {player.spirito=Math.min(99,player.spirito+3);updHud();toast('"Alla Porta!" — Spirito +3. Weee naja!');}
function doEat()  {player.spirito=Math.min(99,player.spirito+1);player.forza=Math.min(99,player.forza+1);updHud();toast('Pasta scotta. Forza +1, Spirito +1.');}
function doHeal() {player.forza=Math.min(99,player.forza+4);updHud();toast('Infermeria. Forza +4.');}
function updHud(){
  document.getElementById('h-for').textContent=player.forza;
  document.getElementById('h-spi').textContent=player.spirito;
  document.getElementById('h-dis').textContent=player.disc;
  document.getElementById('sb-for').textContent=player.forza;
  document.getElementById('sb-spi').textContent=player.spirito;
  document.getElementById('sb-dis').textContent=player.disc;
  document.getElementById('sb-lan').textContent=player.lanci;
}
let tt=null;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.opacity='1';if(tt)clearTimeout(tt);tt=setTimeout(()=>t.style.opacity='0',2800);}

const inN=document.getElementById('inp-nome'),inC=document.getElementById('inp-cogn'),bS=document.getElementById('btn-start');
function chk(){bS.disabled=!(inN.value.trim()&&inC.value.trim());document.getElementById('err-msg').classList.remove('show');}
inN.addEventListener('input',chk);inC.addEventListener('input',chk);
inN.addEventListener('keydown',e=>{if(e.key==='Enter')inC.focus();});
inC.addEventListener('keydown',e=>{if(e.key==='Enter'&&!bS.disabled)bS.click();});
bS.addEventListener('click',()=>{
  const n=inN.value.trim(),c=inC.value.trim();
  if(!n||!c){document.getElementById('err-msg').classList.add('show');return;}
  player.nome=n;player.cognome=c;
  document.getElementById('hud-name').textContent='SOLDATO '+c.toUpperCase();
  document.getElementById('screen-login').style.display='none';
  document.getElementById('screen-map').classList.add('show');
  requestAnimationFrame(()=>requestAnimationFrame(()=>buildMap()));
  setTimeout(()=>toast('"Weee naja! Benvenuto Soldato '+c+'"'),400);
});
document.getElementById('bg-login').style.backgroundImage="url('bg.png?v=3')";
</script>

</body>
