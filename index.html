<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PARACA</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#000;
  overflow:hidden;
}

/* ===== LOGIN ===== */
#login{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

/* IMMAGINE PARACADUTISTI */
#bg{
  position:absolute;
  inset:0;
  background:url("bg.png") center/cover no-repeat;
  z-index:0;
}

/* BOX LOGIN */
#box{
  position:relative;
  z-index:1;
  background:rgba(255,255,255,0.9);
  padding:20px;
  border-radius:10px;
  width:250px;
  text-align:center;
}

input{
  width:100%;
  margin:10px 0;
  padding:10px;
}

button{
  width:100%;
  padding:10px;
  background:#7B1020;
  color:white;
  border:none;
  cursor:pointer;
}

/* ===== MAPPA ===== */
#game{
  display:none;
  position:fixed;
  inset:0;
}

#map{
  width:100%;
  height:100%;
  object-fit:cover;
}
</style>

</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div id="bg"></div>

  <div id="box">
    <h2>PARACA!</h2>

    <input id="nome" placeholder="Nome">
    <input id="cognome" placeholder="Cognome">

    <button onclick="start()">INIZIA</button>
  </div>
</div>

<!-- MAPPA -->
<div id="game">
  <img id="map" src="E203C4EC-1216-469D-9B0E-7465C587B443.png">
</div>

<script>
function start(){
  let nome = document.getElementById("nome").value;
  let cognome = document.getElementById("cognome").value;

  if(!nome || !cognome){
    alert("Inserisci nome e cognome");
    return;
  }

  document.getElementById("login").style.display = "none";
  document.getElementById("game").style.display = "block";
}
</script>

</body>
</html>
